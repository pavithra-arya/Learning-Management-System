{% extends "base.html" %}

{% block title %}Register - EduLMS{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-lg w-full space-y-6 bg-white p-10 rounded-xl shadow-xl border border-slate-100">
        <div>
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-teal-100">
                <i class="fas fa-user-plus text-3xl text-teal-600"></i>
            </div>
            <h2 class="mt-6 text-center text-3xl font-bold text-slate-900">
                Create your account
            </h2>
            <p class="mt-2 text-center text-sm text-slate-600">
                Join the EduLMS platform
            </p>
        </div>

        <form class="mt-8 space-y-6" action="{{ url_for('auth.register') }}" method="POST">
            <div class="space-y-4 shadow-sm">
                <!-- Role Selection -->
                <div class="flex justify-center space-x-4 mb-6">
                    <label class="cursor-pointer relative">
                        <input type="radio" name="role" value="student" checked class="peer sr-only">
                        <div
                            class="rounded-lg border-2 border-slate-200 px-6 py-3 hover:bg-slate-50 peer-checked:border-teal-600 peer-checked:bg-teal-50 peer-checked:text-teal-600 transition-all font-medium text-slate-700">
                            <i class="fas fa-user-graduate mr-2"></i> Student
                        </div>
                    </label>
                    <label class="cursor-pointer relative">
                        <input type="radio" name="role" value="teacher" class="peer sr-only">
                        <div
                            class="rounded-lg border-2 border-slate-200 px-6 py-3 hover:bg-slate-50 peer-checked:border-teal-600 peer-checked:bg-teal-50 peer-checked:text-teal-600 transition-all font-medium text-slate-700">
                            <i class="fas fa-chalkboard-teacher mr-2"></i> Teacher
                        </div>
                    </label>
                </div>

                <div>
                    <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                    <input id="name" name="name" type="text" required
                        class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-md focus:outline-none focus:ring-teal-500 focus:border-teal-500 sm:text-sm shadow-sm"
                        placeholder="John Doe">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
                    <input id="email" name="email" type="email" autocomplete="email" required
                        class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-md focus:outline-none focus:ring-teal-500 focus:border-teal-500 sm:text-sm shadow-sm"
                        placeholder="john@example.com">
                </div>

                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input id="username" name="username" type="text" autocomplete="username" required
                        class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-md focus:outline-none focus:ring-teal-500 focus:border-teal-500 sm:text-sm shadow-sm"
                        placeholder="johndoe123">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input id="password" name="password" type="password" autocomplete="new-password" required
                        class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-md focus:outline-none focus:ring-teal-500 focus:border-teal-500 sm:text-sm shadow-sm"
                        placeholder="••••••••">
                </div>
            </div>

            <div>
                <button type="submit"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 shadow-lg transition-colors">
                    Sign up
                </button>
            </div>

            <p class="mt-4 text-center text-sm text-slate-600">
                Already have an account?
                <a href="{{ url_for('auth.login') }}"
                    class="font-medium text-teal-600 hover:text-teal-500 transition-colors">
                    Sign in here
                </a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
