{% extends "base.html" %}

{% block title %}Create Course - EduLMS{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-8">
    <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-100">
        <div class="mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-slate-900 flex items-center">
                <i class="fas fa-plus-circle text-teal-500 mr-3"></i> Create New Course
            </h1>
            <p class="text-slate-500 mt-2">Set up a new learning environment for your students.</p>
        </div>

        <form action="{{ url_for('teacher.create_course') }}" method="POST" class="space-y-6">
            <div>
                <label for="title" class="block text-sm font-medium text-slate-700 mb-2">Course Title <span class="text-red-500">*</span></label>
                <input type="text" id="title" name="title" required
                       class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition shadow-sm"
                       placeholder="e.g. Introduction to Computer Science">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-slate-700 mb-2">Description</label>
                <textarea id="description" name="description" rows="5"
                          class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition shadow-sm resize-y"
                          placeholder="What will students learn in this course?"></textarea>
            </div>

            <div class="flex justify-end space-x-4 pt-4 border-t">
                <a href="{{ url_for('teacher.dashboard') }}" class="px-6 py-2 border border-slate-300 rounded-lg text-slate-700 hover:bg-slate-50 font-medium transition">
                    Cancel
                </a>
                <button type="submit" class="px-6 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded-lg font-medium shadow-md transition">
                    Create Course
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
