{% extends "base.html" %}

{% block title %}Create Assignment - {{ course.title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-8">
    <div class="flex items-center text-sm text-slate-500 mb-6">
        <a href="{{ url_for('teacher.dashboard') }}" class="hover:text-teal-600"><i class="fas fa-home"></i></a>
        <span class="mx-2">/</span>
        <a href="{{ url_for('teacher.view_course', course_id=course.id) }}" class="hover:text-teal-600">{{ course.title }}</a>
        <span class="mx-2">/</span>
        <span class="text-slate-900 font-medium">New Assignment</span>
    </div>

    <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-100">
        <div class="mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-slate-900 flex items-center">
                <i class="fas fa-tasks text-teal-500 mr-3"></i> Create Assignment
            </h1>
            <p class="text-slate-500 mt-2">Add a new task for your students in <span class="font-semibold">{{ course.title }}</span>.</p>
        </div>

        <form action="{{ url_for('teacher.create_assignment', course_id=course.id) }}" method="POST" class="space-y-6">
            <div>
                <label for="title" class="block text-sm font-medium text-slate-700 mb-2">Assignment Title <span class="text-red-500">*</span></label>
                <input type="text" id="title" name="title" required
                       class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition shadow-sm"
                       placeholder="e.g. Chapter 4 Exercises">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-slate-700 mb-2">Instructions <span class="text-red-500">*</span></label>
                <textarea id="description" name="description" rows="5" required
                          class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition shadow-sm resize-y"
                          placeholder="Provide clear instructions on what needs to be done..."></textarea>
            </div>

            <div>
                <label for="due_date" class="block text-sm font-medium text-slate-700 mb-2">Due Date & Time <span class="text-red-500">*</span></label>
                <input type="datetime-local" id="due_date" name="due_date" required
                       class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition shadow-sm bg-slate-50 hover:bg-white cursor-pointer">
            </div>

            <div class="flex justify-end space-x-4 pt-6 border-t mt-8">
                <a href="{{ url_for('teacher.view_course', course_id=course.id) }}" class="px-6 py-2 border border-slate-300 rounded-lg text-slate-700 hover:bg-slate-50 font-medium transition">
                    Cancel
                </a>
                <button type="submit" class="px-6 py-2 bg-teal-600 hover:bg-teal-700 text-white rounded-lg font-medium shadow-md transition flex items-center">
                    <i class="fas fa-save mr-2"></i> Save Assignment
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
